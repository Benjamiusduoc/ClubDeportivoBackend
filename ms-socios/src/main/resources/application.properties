spring.application.name=ms-socios

# Laragon: inicia MySQL desde Laragon (menú > MySQL > Start). Puerto por defecto 3306.
# Crea la base "ms_socios" en HeidiSQL/phpMyAdmin o deja createDatabaseIfNotExist en la URL.
# Usuario/contraseña por defecto en Laragon suele ser root sin contraseña; si cambiaste la de root, ponla en MYSQL_PASSWORD.
spring.datasource.url=${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/ms_socios?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=America/Santiago}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
